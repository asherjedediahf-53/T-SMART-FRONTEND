<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — T-Smart</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #0f9688;
      --teal-light: #e6f4f3;
      --teal-dark: #0a7a6e;
      --bg: #f0f4f3;
      --border: #e2e8e7;
      --text: #1c2b2a;
      --text-muted: #6b8280;
      --white: #ffffff;
      --error: #dc2626;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15,150,136,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15,150,136,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 48px 44px;
      width: 420px;
      max-width: 94vw;
      box-shadow: 0 20px 60px rgba(15,150,136,0.12), 0 4px 16px rgba(0,0,0,0.07);
      position: relative;
      z-index: 1;
      animation: fadeUp 0.35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: var(--teal);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.2px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .error-msg {
      display: none;
      align-items: center;
      gap: 7px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 18px;
      animation: shake 0.3s ease;
    }

    .error-msg.show { display: flex; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      60%       { transform: translateX(5px); }
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .form-input {
      width: 100%;
      padding: 11px 12px 11px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .form-input:focus {
      border-color: var(--teal);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(15,150,136,0.1);
    }

    .form-input.error {
      border-color: var(--error);
      background: var(--error-bg);
    }

    .toggle-pw {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
    }

    .toggle-pw:hover { color: var(--text); }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      margin-top: 6px;
      box-shadow: 0 4px 14px rgba(15,150,136,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover {
      background: var(--teal-dark);
      box-shadow: 0 6px 20px rgba(15,150,136,0.3);
    }

    .login-btn:active { transform: scale(0.98); }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .spinner.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .login-footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="brand">
      <div class="brand-icon">🗂️</div>
      <span class="brand-name">T-Smart</span>
    </div>

    <div class="login-title">Welcome back 👋</div>
    <div class="login-subtitle">Sign in to your account to continue.</div>

    <div class="error-msg" id="errorMsg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Invalid username or password.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <input class="form-input" id="username" type="text" placeholder="Enter your username" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input class="form-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePassword()" title="Show/hide password">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="handleLogin()">
      <span id="btnText">Sign in</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="login-footer">
      Forgot your password? Contact your system administrator.
    </div>

  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.innerHTML = isHidden
        ? `<line x1="1" y1="1" x2="23" y2="23"/>
           <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    }

    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('errorMsg').classList.remove('show');
        document.getElementById(id).classList.remove('error');
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const spinner  = document.getElementById('spinner');
      const btnText  = document.getElementById('btnText');

      if (!username || !password) {
        showError('Please enter both username and password.');
        if (!username) document.getElementById('username').classList.add('error');
        if (!password) document.getElementById('password').classList.add('error');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Signing in…';
      spinner.classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');

      try {
        const res = await fetch('api/auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', username, password })
        });
        const result = await res.json();
        if (res.ok && result.success) {
          sessionStorage.setItem('tt_auth', 'true');
          sessionStorage.setItem('tt_user', result.username);
          sessionStorage.setItem('tt_role', result.role);
          window.location.href = 'home.html';
        } else {
          btn.disabled = false;
          btnText.textContent = 'Sign in';
          spinner.classList.remove('show');
          showError(result.error || 'Invalid username or password.');
          document.getElementById('username').classList.add('error');
          document.getElementById('password').classList.add('error');
          document.getElementById('password').value = '';
        }
      } catch(e) {
        btn.disabled = false;
        btnText.textContent = 'Sign in';
        spinner.classList.remove('show');
        showError('Cannot connect to server. Please try again.');
      }
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.add('show');
    }

    if (sessionStorage.getItem('tt_auth') === 'true') {
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
